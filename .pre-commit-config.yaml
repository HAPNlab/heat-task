repos:
  - repo: local
    hooks:
      - id: protect-safety-limits
        name: Protect safety limits
        entry: >-
          bash -c 'git diff --cached --diff-filter=M --name-only | grep -q "src/medoc/safety.py" && echo "ERROR: safety.py is safety-critical and protected. If this change is intentional, recompute _CHECKSUM and commit deliberately." && exit 1 || exit 0'
        language: system
        always_run: true
        pass_filenames: false
